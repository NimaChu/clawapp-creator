name: Sync Site Download Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-site-download:
    runs-on: ubuntu-latest

    steps:
      - name: Check out clawapp-creator
        uses: actions/checkout@v4

      - name: Build download zip from current main
        run: |
          git archive --format=zip --output clawapp-creator.zip HEAD

      - name: Check out nima-tech-space
        uses: actions/checkout@v4
        with:
          repository: NimaChu/nima-tech-space
          ref: main
          token: ${{ secrets.NIMA_SITE_SYNC_TOKEN }}
          path: nima-tech-space

      - name: Replace hosted skill download zip
        run: |
          mkdir -p nima-tech-space/public/downloads
          cp clawapp-creator.zip nima-tech-space/public/downloads/clawapp-creator.zip

      - name: Commit and push if changed
        working-directory: nima-tech-space
        env:
          GIT_AUTHOR_NAME: clawapp-creator-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: clawapp-creator-bot
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          if git diff --quiet -- public/downloads/clawapp-creator.zip; then
            echo "No download zip changes to sync."
            exit 0
          fi

          git add public/downloads/clawapp-creator.zip
          git commit -m "Sync clawapp-creator download zip"
          git push origin main
